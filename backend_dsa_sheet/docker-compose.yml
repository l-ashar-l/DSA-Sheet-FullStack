version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo-data:/data/db

  backend:
    build: .
    container_name: backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 8000
      MONGO_URI: mongodb://admin:password123@mongo:27017/dsa_sheet?authSource=admin
      JWT_SECRET: ehibxqsogxsdag@131
    depends_on:
      - mongo

volumes:
  mongo-data: